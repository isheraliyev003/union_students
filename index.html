      (function () {
        try {
          var k = 'union-theme'
          var t = localStorage.getItem(k)
          var dark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {}
      })()
